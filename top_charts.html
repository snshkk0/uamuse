<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>uamuse — top charts</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300..700;1,300..700&display=swap" rel="stylesheet">
</head>
<body>
    <header>
        <nav>
            <ul class="nav-links">
                <li class="shape"><a href="./index.html" rel="noopener noreferrer"><div class="div_nav">HOME</div></a></li>
                <li class="shape"><a href="./match_my_mood.html" rel="noopener noreferrer"><div class="div_nav">MATCH MY GENRE</div></a></li>
                <li class="shape active"><a href="./top_charts.html" rel="noopener noreferrer"><div class="div_nav">MY TOP CHARTS</div></a></li>
                <li class="shape"><a href="./discover.html" rel="noopener noreferrer"><div class="div_nav">DISCOVER</div></a></li>
                <li class="shape"><a href="./about_me.html" rel="noopener noreferrer"><div class="div_nav">ABOUT ME</div></a></li>
                <li class="shape_login"><a href="./log_in.html" rel="noopener noreferrer"><div class="div_nav">login / register</div></a></li>
            </ul>
        </nav>
    </header>

    <section class="page-hero">
        <h1>TOP CHARTS</h1>
        <p class="hero-tagline">The hottest Ukrainian tracks right now</p>
    </section>

    <div class="parallax-band"></div>

    <section class="home-section" style="padding-bottom: 120px;">
        <table id="chartsTable">
            <thead>
                <tr>
                    <th>#</th>
                    <th>Artist</th>
                    <th>Plays</th>
                    <th>Last played</th>
                </tr>
            </thead>
            <tbody id="chartsBody">
                <tr><td colspan="4" style="text-align:center; color:rgba(245,245,245,0.4); padding:40px;">Loading charts...</td></tr>
            </tbody>
        </table>
    </section>

    <script>
        const API_URL = window.location.hostname === 'localhost'
            ? 'http://localhost:3001/api'
            : 'https://your-server.railway.app/api';

        async function loadCharts() {
            const tbody = document.getElementById('chartsBody');
            try {
                const userId = localStorage.getItem('uamuse_user_id');
                const endpoint = userId
                    ? `${API_URL}/charts/user/${userId}`
                    : `${API_URL}/charts`;

                const res  = await fetch(endpoint);
                const rows = await res.json();

                if (!rows.length) {
                    tbody.innerHTML = `<tr><td colspan="4" style="text-align:center; color:rgba(245,245,245,0.4); padding:40px;">
                        No Ukrainian plays recorded yet — log in with Spotify to build your charts!
                    </td></tr>`;
                    return;
                }

                tbody.innerHTML = rows.map((row, i) => `
                    <tr>
                        <td class="chart-rank">${i + 1}</td>
                        <td>${row.artist_name}</td>
                        <td>${row.play_count}</td>
                        <td style="color:rgba(245,245,245,0.45); font-size:0.85rem;">
                            ${new Date(row.last_played).toLocaleDateString()}
                        </td>
                    </tr>
                `).join('');
            } catch (err) {
                tbody.innerHTML = `<tr><td colspan="4" style="text-align:center; color:rgba(245,245,245,0.4); padding:40px;">
                    Could not load charts — make sure the server is running.
                </td></tr>`;
            }
        }

        loadCharts();
    </script>

    <footer><p class="footer">слухайте українське!</p></footer>
    <script src="parallax.js" defer></script>
</body>
</html>
