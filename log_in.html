<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>uamuse</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300..700;1,300..700&display=swap" rel="stylesheet">
</head>
<body>
<h1 class="hero_section">LOGIN</h1>

    <div class="login-card">
        <form class="login-form">
            <label class="login-label" for="uname">Username</label>
            <input class="login-input" type="text" id="uname" placeholder="Enter Username" name="uname" required>

            <label class="login-label" for="psw">Password</label>
            <input class="login-input" type="password" id="psw" placeholder="Enter Password" name="psw" required>

            <label class="login-remember">
                <input type="checkbox" checked name="remember">
                Remember me
            </label>

            <button class="login-btn" type="submit">LOGIN</button>

            <div class="login-divider"><span>or</span></div>

            <button class="spotify-btn" id="spotify-login-btn" type="button">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M12 0C5.4 0 0 5.4 0 12s5.4 12 12 12 12-5.4 12-12S18.66 0 12 0zm5.521 17.34c-.24.359-.66.48-1.021.24-2.82-1.74-6.36-2.101-10.561-1.141-.418.122-.779-.179-.899-.539-.12-.421.18-.78.54-.9 4.56-1.021 8.52-.6 11.64 1.32.42.18.479.659.301 1.02zm1.44-3.3c-.301.42-.841.6-1.262.3-3.239-1.98-8.159-2.58-11.939-1.38-.479.12-1.02-.12-1.14-.6-.12-.48.12-1.021.6-1.141C9.6 9.9 15 10.561 18.72 12.84c.361.181.54.78.241 1.2zm.12-3.36C15.24 8.4 8.82 8.16 5.16 9.301c-.6.179-1.2-.181-1.38-.721-.18-.601.18-1.2.72-1.381 4.26-1.26 11.28-1.02 15.721 1.621.539.3.719 1.02.419 1.56-.299.421-1.02.599-1.559.3z"/></svg>
                LOGIN WITH SPOTIFY
            </button>

            <p class="login-switch">Don't have an account? <a href="./register.html">Register</a></p>
            <p class="login-switch"><a href="./index.html">← Back to site</a></p>
        </form>
    </div>

    <footer><p class="footer">слухайте українське!</p></footer>

    <script src="script.js" defer></script>
    <script src="spotify-auth.js" defer></script>
</body>
</html>
