<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>uamuse</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <h1 class="login hero_section">LOGIN</h1>
    <div>
        <label class="login" for="uname"><b>Username</b></label>
        <input class="login" type="text" placeholder="Enter Username" name="uname" required>

        <label class="login" for="psw"><b>Password</b></label>
        <input  class="login" type="password" placeholder="Enter Password" name="psw" required>

        <button class="login" class="login_button" type="submit">Login</button>
        <label>
            <input class="login" type="checkbox" checked="checked" name="remember">Remember me
        </label>
    </div>
    
</body>
</html>
